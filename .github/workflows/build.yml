name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default-debug
            command: cargo build --locked
          - name: default-release
            command: cargo build --locked --release
          - name: encoder-debug
            command: cargo build --locked --no-default-features --features encoder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: ${{ matrix.command }}
